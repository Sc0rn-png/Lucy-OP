<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Lucy - Zoom Cartes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pirata+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AC0D; --dark: #0D0D0D; --dark2: #1A1A1A; --red: #C0392B; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 20px; }
        h1 { font-family: 'Pirata One', cursive; color: var(--gold); text-align: center; font-size: 40px; margin-bottom: 5px; }
        .back-link { display: block; text-align: center; color: var(--red); text-decoration: none; font-family: 'Bebas Neue'; margin-bottom: 20px; }
        
        /* Grille de cartes */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 800px; margin: 0 auto; }
        .card-item { cursor: pointer; transition: transform 0.2s; }
        .card-item:active { transform: scale(0.95); }
        .card-item img { width: 100%; border-radius: 8px; border: 1px solid #333; display: block; }
        .card-item p { font-size: 10px; text-align: center; margin-top: 5px; color: #aaa; }

        /* Système de Zoom (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { max-width: 95%; max-height: 80vh; border-radius: 15px; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212,172,13,0.3); }
        .close { position: absolute; top: 20px; right: 20px; font-size: 40px; color: #fff; font-family: sans-serif; cursor: pointer; }
        
        .cat-title { font-family: 'Bebas Neue'; color: var(--gold); border-bottom: 1px solid var(--gold); margin: 25px 0 15px; padding-bottom: 5px; grid-column: span 3; }
    </style>
</head>
<body>

    <h1>CODEX LUCY</h1>
    <a href="index.html" class="back-link">← RETOUR AU GUIDE</a>

    <div class="grid">
        <div class="cat-title">Leader</div>
        <div class="card-item" onclick="zoom(this)"><img src="images/lucy.png"><p>Lucy</p></div>

        <div class="cat-title">Personnages</div>
        <div class="card-item" onclick="zoom(this)"><img src="images/viola.png"><p>Viola</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/rebecca.png"><p>Rebecca</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/bartolomeo.png"><p>Bartolomeo</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/cavendish.png"><p>Cavendish</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/sabo_op10.png"><p>Sabo 2k</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/sabo_046.png"><p>Sabo 9k</p></div>

        <div class="cat-title">Événements</div>
        <div class="card-item" onclick="zoom(this)"><img src="images/fire_fist.png"><p>Fire Fist (2)</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/ace_event.png"><p>Just Watch Me</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/no_one_else.png"><p>And No One Else</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/bbp.png"><p>BBP Pistol</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/fire_fist_op15.png"><p>Fire Fist (7)</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/guide.png"><p>Follow Me</p></div>
        <div class="card-item" onclick="zoom(this)"><img src="images/koala.png"><p>Koala</p></div>

        <div class="cat-title">Stages</div>
        <div class="card-item" onclick="zoom(this)"><img src="images/dres.png"><p>Dressrosa Kingdom</p></div>
    </div>

    <div class="modal" id="modal" onclick="this.classList.remove('active')">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        function zoom(el) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImg');
            const clickedImg = el.querySelector('img');
            modalImg.src = clickedImg.src;
            modal.classList.add('active');
        }
    </script>
</body>
</html>
